services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/biked
      - SPRING_DATASOURCE_USERNAME=biked
      - SPRING_DATASOURCE_PASSWORD=biked123
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=biked
      - POSTGRES_USER=biked
      - POSTGRES_PASSWORD=biked123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U biked" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: